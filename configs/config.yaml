model:
  generator: "Qwen/Qwen2.5-3B-Instruct"
  judge: "gemini-2.5-flash"

data:
  dataset: "qiaojin/PubMedQA"
  config: "pqa_labeled"
  n_samples: 5  # keep small for testing; override via CLI (--n-samples 50 / 1000)
  seed: 42

generation:
  max_new_tokens: 512
  temperature: 1.0
  do_sample: false

output:
  dir: "data/outputs"
  filename: "pipeline_output.jsonl"

storage:
  save_top100_logits: true
  save_attention_matrices: true
  save_hidden_states: true
  attention_dtype: "float32"
