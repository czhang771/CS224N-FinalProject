model:
  generator: "Qwen/Qwen2.5-3B-Instruct"
  judge: "gemini-2.5-flash"

data:
  dataset: "qiaojin/PubMedQA"
  config: "pqa_labeled"
  n_samples: 100
  seed: 42

generation:
  max_new_tokens: 512
  temperature: 1.0
  do_sample: false

output:
  dir: "data/outputs"
  filename: "pipeline_output.jsonl"
